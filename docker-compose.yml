services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      # Provider APIs are supplied via headers or can be added here as defaults
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - LLM_PROVIDER=groq
      - CHROMA_PERSIST_DIR=/app/chroma_db
      - SQLITE_DB_PATH=/app/data/app.db
      - HF_HOME=/app/data/huggingface
      - RELOAD=false
    volumes:
      # Persist SQLite and ChromaDB data
      - tuberag_data:/app/data
      - tuberag_chroma:/app/chroma_db
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  tuberag_data:
  tuberag_chroma:
